<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Panel Admin · Club de Beneficios</title>
<meta name="viewport" content="width=1440"/>
<link rel="stylesheet" href="admin-styles.css"/>
<style>
  body { margin: 0; background: #050505; }
  .canvas-host { min-height: 100vh; }
  /* Each artboard is a fixed-size desktop frame */
  .desktop-frame {
    width: 1440px; height: 900px;
    background: var(--ad-bg);
    overflow: hidden;
    border-radius: 8px;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="admin-shared.jsx"></script>
<script type="text/babel" src="admin-dashboard.jsx"></script>
<script type="text/babel" src="admin-beneficios.jsx"></script>
<script type="text/babel" src="admin-pages.jsx"></script>

<script type="text/babel">
function AdminShell({ activeNav, children }) {
  return (
    <div className="ad">
      <div className="desktop-frame">
        <div className="ad-shell">
          <Sidebar active={activeNav}/>
          <div className="ad-main">
            {children}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas storageKey="admin-club-beneficios" defaultZoom={0.55}>
      <DCSection id="overview" title="Panel de administración" subtitle="Club de Beneficios · Paseo de la Ribera · Desktop 1440×900">

        <DCArtboard id="dashboard" label="01 · Dashboard" width={1440} height={900}>
          <AdminShell activeNav="dashboard">
            <Topbar crumbs={['Inicio', 'Dashboard']}/>
            <Dashboard/>
          </AdminShell>
        </DCArtboard>

        <DCArtboard id="beneficios" label="02 · Beneficios" width={1440} height={900}>
          <AdminShell activeNav="beneficios">
            <Topbar crumbs={['Inicio', 'Beneficios']}/>
            <Beneficios/>
          </AdminShell>
        </DCArtboard>

        <DCArtboard id="beneficios-modal" label="03 · Nuevo beneficio (modal)" width={1440} height={900}>
          <AdminShell activeNav="beneficios">
            <Topbar crumbs={['Inicio', 'Beneficios']}/>
            <BeneficiosWithModal/>
          </AdminShell>
        </DCArtboard>

        <DCArtboard id="ruleta" label="04 · Premios de Ruleta" width={1440} height={900}>
          <AdminShell activeNav="ruleta">
            <Topbar crumbs={['Inicio', 'Premios de Ruleta']}/>
            <PremiosRuleta/>
          </AdminShell>
        </DCArtboard>

        <DCArtboard id="usuarios" label="05 · Usuarios" width={1440} height={900}>
          <AdminShell activeNav="usuarios">
            <Topbar crumbs={['Inicio', 'Usuarios']}/>
            <Usuarios/>
          </AdminShell>
        </DCArtboard>

        <DCArtboard id="canjes" label="06 · Canjes" width={1440} height={900}>
          <AdminShell activeNav="canjes">
            <Topbar crumbs={['Inicio', 'Canjes']}/>
            <Canjes/>
          </AdminShell>
        </DCArtboard>

      </DCSection>
    </DesignCanvas>
  );
}

// Variant: Beneficios with modal opened by default
function BeneficiosWithModal() {
  const [show, setShow] = React.useState(true);
  return (
    <>
      <Beneficios/>
      {show && <BenefitModal onClose={() => setShow(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
