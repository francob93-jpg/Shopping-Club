<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Club de Beneficios · Hi-Fi</title>
<link rel="stylesheet" href="hifi-styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="hf" style="background:#efe9df;">

<script type="text/babel" src="hifi-shared.jsx"></script>
<script type="text/babel" src="hifi-home.jsx"></script>
<script type="text/babel" src="hifi-benefits.jsx"></script>
<script type="text/babel" src="hifi-wheel.jsx"></script>
<script type="text/babel" src="hifi-other.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const AW = 395, AH = 800;

function App() {
  return (
    <DesignCanvas title="Club de Beneficios — Hi-Fi" subtitle="Paseo de la Ribera · Río Cuarto · combo elegido">

      <DCSection id="intro" title="Intro" subtitle="Dirección elegida · paleta Paseo de la Ribera">
        <DCArtboard id="intro" label="Leéme primero" width={540} height={640}>
          <div className="hf" style={{padding:32, height:'100%', background:'#fff', boxSizing:'border-box'}}>
            <HFLogo size="lg"/>
            <div className="serif" style={{fontSize:36, fontWeight:600, marginTop:22, lineHeight:1.1, color:'var(--hf-ink)'}}>
              Hi-fi v1
            </div>
            <div style={{fontSize:14, color:'var(--hf-muted)', marginTop:4}}>7 pantallas · combo elegido</div>

            <div style={{marginTop:22, fontSize:13, lineHeight:1.6, color:'var(--hf-ink-2)'}}>
              <p><b>Sistema visual</b></p>
              <ul style={{paddingLeft:18, margin:'4px 0 12px'}}>
                <li>Primario: rojo Paseo (#c8102e) + acento dorado (#b8863a)</li>
                <li>Fondo crema suave (#f7f4ef), superficies blancas con sombras bajas</li>
                <li>Tipografía: <b className="serif" style={{fontWeight:600}}>Fraunces</b> para títulos + <b>Plus Jakarta Sans</b> para UI + <span className="mono">JetBrains Mono</span> para códigos</li>
                <li>Esquinas 14-22px, sombras suaves, tarjetas con aire</li>
              </ul>

              <p><b>Placeholders a reemplazar</b></p>
              <ul style={{paddingLeft:18, margin:'4px 0 12px'}}>
                <li>Logo: monograma <b>Pr</b> (recreado; pasame el PNG oficial)</li>
                <li>Imágenes de beneficios: gradientes por categoría (esperan fotos reales)</li>
              </ul>

              <div style={{display:'flex', gap:8, marginTop:14, flexWrap:'wrap'}}>
                {[
                  ['#c8102e','rojo Paseo'],
                  ['#8e0a1f','rojo oscuro'],
                  ['#b8863a','dorado'],
                  ['#f7f4ef','fondo'],
                  ['#1a1423','tinta'],
                ].map(([c,l])=>(
                  <div key={c} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:4}}>
                    <div style={{width:50, height:50, borderRadius:12, background:c, border:'1px solid rgba(0,0,0,0.06)'}}/>
                    <div style={{fontSize:10, color:'var(--hf-muted)'}}>{l}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="home" title="1 · Home" subtitle="variante B — credencial al frente">
        <DCArtboard id="home" label="Home" width={AW} height={AH}><HFHome/></DCArtboard>
      </DCSection>

      <DCSection id="benefits" title="2 · Beneficios" subtitle="lista + detalle + canje QR">
        <DCArtboard id="ben-list" label="Lista" width={AW} height={AH}><HFBenList/></DCArtboard>
        <DCArtboard id="ben-detail" label="Detalle" width={AW} height={AH}><HFBenDetail/></DCArtboard>
        <DCArtboard id="ben-redeem" label="Canje QR" width={AW} height={AH}><HFBenRedeem/></DCArtboard>
      </DCSection>

      <DCSection id="wheel" title="3 · Ruleta" subtitle="3 estados">
        <DCArtboard id="wheel-a" label="A · Girar" width={AW} height={AH}><HFWheelA/></DCArtboard>
        <DCArtboard id="wheel-b" label="B · Ganaste" width={AW} height={AH}><HFWheelB/></DCArtboard>
        <DCArtboard id="wheel-c" label="C · Ya usada" width={AW} height={AH}><HFWheelC/></DCArtboard>
      </DCSection>

      <DCSection id="news" title="4 · Novedades" subtitle="feed estilo social">
        <DCArtboard id="news" label="Novedades" width={AW} height={AH}><HFNews/></DCArtboard>
      </DCSection>

      <DCSection id="profile" title="5 · Credencial / Perfil" subtitle="variante B — Wallet">
        <DCArtboard id="profile" label="Credencial" width={AW} height={AH}><HFProfile/></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
